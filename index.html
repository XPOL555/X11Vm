<!doctype html>
<html lang="en" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X11Vm</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body class="h-screen w-full overflow-hidden flex flex-col">
    <!-- Header -->
    <header class="h-14 border-b border-[var(--color-border-light)] dark:border-[var(--color-border-dark)] bg-[var(--color-card-light)] dark:bg-[var(--color-card-dark)] flex items-center justify-between px-6 shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded bg-[var(--color-primary)] flex items-center justify-center text-white font-bold text-sm shadow-sm">X</div>
        <h1 class="text-lg font-semibold tracking-tight">X11Vm Control</h1>
      </div>
      <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-[var(--color-bg-light)] dark:bg-[#2a2a2a] text-xs font-medium border border-[var(--color-border-light)] dark:border-transparent transition-colors duration-200">
        <div id="status-indicator" class="w-2 h-2 rounded-full bg-yellow-400 shadow-[0_0_8px_rgba(250,204,21,0.6)]"></div>
        <span id="status-text">Checking Status...</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex w-full h-[calc(100vh-3.5rem)]">
      
      <!-- Left Panel: Controls -->
      <aside class="w-72 shrink-0 border-r border-[var(--color-border-light)] dark:border-[var(--color-border-dark)] bg-[var(--color-bg-light)] dark:bg-[var(--color-bg-dark)] p-6 overflow-y-auto flex flex-col gap-8">
        
        <!-- Engine Section -->
        <section class="flex flex-col gap-3">
          <h2 class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Docker Engine</h2>
          <button id="btn-build" class="btn btn-secondary w-full">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            Build Base Image
          </button>
          <button id="btn-start" class="btn btn-primary w-full" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Start Environment
          </button>
          <button id="btn-stop" class="btn btn-danger w-full mt-2" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
            Stop Environment
          </button>
        </section>

        <!-- Applications Section -->
        <section class="flex flex-col gap-3">
          <h2 class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Applications</h2>
          <button id="btn-attach" class="btn btn-success w-full" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20"></path><path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8"></path><path d="M4 12V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8"></path></svg>
            Attach Display
          </button>
          <div class="grid grid-cols-2 gap-2 mt-2">
            <button id="btn-xemacs" class="btn btn-secondary" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M2 15h10"></path><path d="m9 18 3-3-3-3"></path></svg>
              XEmacs
            </button>
            <button id="btn-terminal" class="btn btn-secondary" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
              Term
            </button>
            <button id="btn-xterm" class="btn btn-secondary col-span-2" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
              Xterm (Legacy)
            </button>
          </div>
        </section>
      </aside>

      <!-- Right Panel: Terminal -->
      <section class="flex-1 bg-[#1e1e1e] flex flex-col overflow-hidden relative">
        <div class="h-8 bg-[#2d2d2d] flex items-center px-4 shrink-0 shadow-sm z-10">
          <span class="text-[11px] font-medium text-gray-400">System Log</span>
        </div>
        <div id="terminal-container" class="flex-1 p-2 overflow-hidden bg-[#1e1e1e]"></div>
      </section>

    </main>
  </body>
</html>
